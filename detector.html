<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Triage Detector v1.7 - Institutional Auditor</title>
    <style>
        :root {
            --bg-dark: #0a0e14; --card-bg: #161b22; --text-main: #adbac7;
            --accent-green: #2ecc71; --accent-magenta: #e056fd;
            --border-color: #444c56; --highlight: #f1c40f;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--card-bg); padding: 10px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .panel { background: var(--card-bg); margin: 8px 12px; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
        #settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-size: 0.7rem; font-weight: bold; color: #8b949e; text-transform: uppercase; }
        input, select, textarea { background: #22272e; border: 1px solid var(--border-color); color: white; padding: 6px; border-radius: 4px; font-size: 0.85rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #2d333b; }
        .ticker-col { color: white; font-weight: 800; font-size: 1.1rem; }
        .price-col { color: var(--highlight); font-family: monospace; font-weight: bold; }
        .range-col { color: #8b949e; font-size: 0.85rem; }
        .promoted { border-left: 5px solid var(--accent-green); background: rgba(46, 204, 113, 0.05); }
        .promoted.bearish { border-left: 5px solid var(--accent-magenta); background: rgba(224, 86, 253, 0.05); }
        .btn { padding: 6px 15px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-green { background: var(--accent-green); color: #000; }
        .btn-yellow { background: var(--highlight); color: #000; }
        .btn-red { background: #e74c3c; color: white; }
        .ofi-meter { height: 8px; background: #333; border-radius: 4px; position: relative; overflow: hidden; width: 100px; }
        .ofi-fill { height: 100%; position: absolute; transition: width 0.3s ease; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; gap:10px; align-items:center;">
        <select id="dataSource">
            <option value="sim">Simulation Mode</option>
            <option value="live">Live Tradier API</option>
        </select>
        <input type="password" id="apiKey" placeholder="Tradier API Key">
        <button class="btn" style="background:#444c56; color:white" onclick="saveKeys()">Save Key</button>
    </div>
    <div id="status">Status: <span id="conn-status" style="color:var(--highlight)">Standby</span> | <span id="clock">00:00:00</span></div>
    <div style="display:flex; gap:8px;">
        <button class="btn" style="background:#444c56; color:white" onclick="manualExport()">Export CSV</button>
        <button id="eraseBtn" class="btn btn-red" style="opacity:0.3" disabled onclick="eraseLog()">Erase Session</button>
    </div>
</header>

<main style="overflow-y:auto; flex:1;">
    <div class="panel" id="settings-grid">
        <div class="control-group"><label>OFI Entry: <span id="val-ofiEntry">3.0</span></label><input type="range" id="param-ofiEntry" min="1.0" max="10.0" step="0.5" value="3.0" oninput="updateParams()"></div>
        <div class="control-group"><label>OFI Exit: <span id="val-ofiExit">1.5</span></label><input type="range" id="param-ofiExit" min="0.5" max="5.0" step="0.1" value="1.5" oninput="updateParams()"></div>
        <div class="control-group">
            <label>Spread Safety ($): <span id="val-maxSpread">0.05</span></label>
            <div style="display:flex;gap:5px;align-items:center;">
                <input type="checkbox" id="param-spreadEnabled" onchange="updateParams()">
                <input type="range" id="param-maxSpread" min="0.01" max="0.50" step="0.01" value="0.05" oninput="updateParams()">
            </div>
        </div>
        <div class="control-group"><label>Max VWAP Dist: <span id="val-vwapMax">1.0</span>%</label><input type="range" id="param-vwapMax" min="0.1" max="5.0" step="0.1" value="1.0" oninput="updateParams()"></div>
    </div>

    <div class="panel">
        <div style="font-weight:bold; color: var(--accent-green); margin-bottom:10px; font-size: 1.1rem">THE ARENA</div>
        <table>
            <thead><tr><th>Stock Ticker</th><th>Price</th><th>High/Low</th><th>%Chg</th><th>Spread</th><th>OFI Meter</th><th>Actions</th></tr></thead>
            <tbody id="arena-body"></tbody>
        </table>
    </div>

    <div class="panel" style="display:flex; gap:12px; align-items:center;">
        <textarea id="tickerInput" style="flex:1; height:45px" placeholder="Paste Tickers (NVDA, AAPL, SPY)"></textarea>
        <button id="startBtn" class="btn btn-green" onclick="startEngine()">Commence Stream</button>
        <button id="pauseBtn" class="btn btn-yellow" onclick="pauseEngine()" disabled>Pause</button>
    </div>

    <div class="panel">
        <div style="font-weight:bold; margin-bottom:10px; color: #8b949e;">BULLPEN</div>
        <table>
            <thead><tr><th>Stock Ticker</th><th>Price</th><th>High/Low</th><th>%Chg</th><th>Spread</th><th>OFI</th><th>Arena History</th></tr></thead>
            <tbody id="bullpen-body"></tbody>
        </table>
    </div>
</main>

<script>
    let tickers = {}; let sessionLog = []; let isDataBackedUp = false; 
    let engineActive = false; let streamInterval = null; let socket = null;
    let params = { ofiEntry: 3.0, ofiExit: 1.5, vwapMax: 1.0, spreadEnabled: false, maxSpread: 0.05 };

    const BRIDGE_URL = "https://curly-succotash-x56r9jgjg7662679g-5000.app.github.dev/get_session";

    window.onload = () => {
        document.getElementById('apiKey').value = localStorage.getItem('tradier_key') || "";
        const saved = JSON.parse(localStorage.getItem('detector_params'));
        if(saved) params = saved;
    };

    function saveKeys() { localStorage.setItem('tradier_key', document.getElementById('apiKey').value); alert("API Key Saved."); }

    function updateParams() {
        params.ofiEntry = parseFloat(document.getElementById('param-ofiEntry').value);
        params.ofiExit = parseFloat(document.getElementById('param-ofiExit').value);
        params.vwapMax = parseFloat(document.getElementById('param-vwapMax').value);
        params.spreadEnabled = document.getElementById('param-spreadEnabled').checked;
        params.maxSpread = parseFloat(document.getElementById('param-maxSpread').value);
        Object.keys(params).forEach(k => { if(document.getElementById(`val-${k}`)) document.getElementById(`val-${k}`).innerText = params[k]; });
        localStorage.setItem('detector_params', JSON.stringify(params));
    }

    async function startEngine() {
        if(engineActive) return;
        const mode = document.getElementById('dataSource').value;
        const key = document.getElementById('apiKey').value;
        const symbols = document.getElementById('tickerInput').value.toUpperCase().split(/[\s,]+/).filter(s => s.length > 0);
        
        symbols.forEach(sym => {
            if(!tickers[sym]) {
                let base = 180; if(sym==='SPY') base=520; if(sym==='NVDA') base=900;
                tickers[sym] = { 
                    symbol: sym, price: base, open: 0, high: 0, low: 99999, bid: 0, ask: 0, ofi: 0, vwap: base, 
                    state: 'BULLPEN', promos: 0, totalTime: 0, 
                    ofiSum: 0, ofiTicks: 0 // For Average Calculation
                };
            }
        });

        engineActive = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('pauseBtn').disabled = false;

        if (mode === 'live') {
            document.getElementById('conn-status').innerText = "Connecting Cloud...";
            const sid = await fetchSessionId(key);
            if(sid) connectWebSocket(sid, symbols);
            else pauseEngine();
        } else {
            document.getElementById('conn-status').innerText = "Simulating...";
            streamInterval = setInterval(processSimData, 1000);
        }
    }

    async function fetchSessionId(key) {
        try {
            const response = await fetch(BRIDGE_URL, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Accept': 'application/json' }
            });
            const data = await response.json();
            return data.stream.sessionid;
        } catch (e) {
            alert("BRIDGE ERROR: Ensure Codespace is running and Port 5000 is PUBLIC.");
            return null;
        }
    }

    function connectWebSocket(sid, symbols) {
        socket = new WebSocket('wss://ws.tradier.com/v1/markets/events');
        socket.onopen = () => {
            socket.send(JSON.stringify({ symbols: symbols, sessionid: sid, filter: ["quote"], linebreak: true }));
            document.getElementById('conn-status').innerText = "API LIVE";
            document.getElementById('conn-status').style.color = "var(--accent-green)";
        };
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if(data.symbol && tickers[data.symbol]) {
                let t = tickers[data.symbol];
                t.price = parseFloat(data.last || data.bid);
                t.bid = parseFloat(data.bid); t.ask = parseFloat(data.ask);
                t.ofi = ((data.bidsize - data.asksize) / 100).toFixed(2); 
                processTickerLogic(data.symbol);
            }
        };
    }

    function processSimData() {
        Object.keys(tickers).forEach(sym => {
            let t = tickers[sym];
            t.price = (parseFloat(t.price) + (Math.random()-0.5)*0.15).toFixed(2);
            t.ofi = (Math.random() * 10 - 5).toFixed(2);
            t.bid = (t.price - 0.01).toFixed(2); t.ask = (parseFloat(t.price) + 0.02).toFixed(2);
            processTickerLogic(sym);
        });
    }

    function processTickerLogic(sym) {
        let t = tickers[sym]; if(t.open === 0) t.open = t.price;
        t.spread = (t.ask - t.bid).toFixed(2);
        const dist = Math.abs(((t.price - t.vwap) / t.vwap) * 100);
        const spreadOk = !params.spreadEnabled || (t.spread <= params.maxSpread);

        if(Math.abs(t.ofi) >= params.ofiEntry && dist <= params.vwapMax && spreadOk && t.state === 'BULLPEN') {
            t.state = 'ARENA'; t.promos++; t.lastEntry = new Date(); t.high = t.price; t.low = t.price;
            t.ofiSum = 0; t.ofiTicks = 0; // Reset average counters on entry
            sessionLog.push({ sym, type: 'ENTRY', price: t.price, time: t.lastEntry.toLocaleTimeString() });
        } else if (Math.abs(t.ofi) < params.ofiExit && t.state === 'ARENA') {
            const avgOfi = (t.ofiSum / t.ofiTicks).toFixed(2);
            t.state = 'BULLPEN';
            const dur = Math.round((new Date() - t.lastEntry) / 1000); t.totalTime += dur;
            sessionLog.push({ sym, type: 'EXIT', price: t.price, high: t.high, low: t.low, time: new Date().toLocaleTimeString(), duration: dur, avgOfi: avgOfi });
        }
        
        if(t.state === 'ARENA') { 
            if(t.price > t.high) t.high = t.price; if(t.price < t.low) t.low = t.price; 
            t.ofiSum += parseFloat(t.ofi); t.ofiTicks++; // Accumulate for average
        }
        render();
    }

    function render() {
        const aBody = document.getElementById('arena-body'); const bBody = document.getElementById('bullpen-body');
        aBody.innerHTML = ''; bBody.innerHTML = '';
        Object.values(tickers).forEach(t => {
            const pct = t.open ? (((t.price - t.open) / t.open) * 100).toFixed(2) : "0.00";
            const row = `<td class="ticker-col">${t.symbol}</td><td class="price-col">$${t.price}</td><td class="range-col">${t.low}/${t.high}</td><td style="color:${pct>=0?'var(--accent-green)':'var(--accent-magenta)'}">${pct}%</td><td>${t.spread}</td>
                <td><div class="ofi-meter"><div class="ofi-fill" style="width:${Math.abs(t.ofi)*10}%; background:${t.ofi>0?'var(--accent-green)':'var(--accent-magenta)'}; left:${t.ofi>0?'50%':'auto'}; right:${t.ofi<0?'50%':'auto'}"></div></div></td>
                <td>${t.state==='ARENA' ? '<button class="btn btn-dim" style="font-size:0.7rem" onclick="navigator.clipboard.writeText(\''+t.symbol+'\')">COPY</button>' : ''}</td>`;
            if(t.state === 'ARENA') {
                const tr = document.createElement('tr'); tr.className = t.ofi > 0 ? 'promoted' : 'promoted bearish'; tr.innerHTML = row; aBody.appendChild(tr);
            } else {
                const tr = document.createElement('tr'); tr.innerHTML = row + `<td>${t.promos} Pr / ${Math.floor(t.totalTime/60)}m</td>`; bBody.appendChild(tr);
            }
        });
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }

    function pauseEngine() { engineActive = false; clearInterval(streamInterval); if(socket) socket.close(); document.getElementById('startBtn').disabled = false; document.getElementById('conn-status').innerText = "Paused"; }

    function manualExport() {
        let csv = "Ticker,Event,Price,Time,High,Low,Duration,AvgOFI\n";
        sessionLog.forEach(l => csv += `${l.sym},${l.type},${l.price},${l.time},${l.high||''},${l.low||''},${l.duration||''},${l.avgOfi||''}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.download = `Session_${new Date().toISOString().slice(0,10)}.csv`; a.href = url; a.click();
        isDataBackedUp = true; document.getElementById('eraseBtn').disabled = false; document.getElementById('eraseBtn').style.opacity = "1";
    }

    function eraseLog() {
        if(confirm("Erase all data?")) {
            sessionLog = []; Object.keys(tickers).forEach(s => { tickers[s].promos = 0; tickers[s].totalTime = 0; });
            isDataBackedUp = false; document.getElementById('eraseBtn').disabled = true; render();
        }
    }
</script>
</body>
</html>
